<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RIKA WEB</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    background: #1e293b;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.message {
    margin: 10px 0;
    padding: 10px 15px;
    border-radius: 10px;
    max-width: 70%;
    white-space: pre-wrap;
}

.user {
    background: #2563eb;
    align-self: flex-end;
}

.bot {
    background: #334155;
    align-self: flex-start;
}

#inputArea {
    display: flex;
    padding: 10px;
    background: #1e293b;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 5px;
    border: none;
}

button {
    margin-left: 5px;
    padding: 10px;
    border: none;
    border-radius: 5px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}

video {
    display: none;
}
</style>
</head>

<body>

<header>🤖 RIKA WEB</header>

<div id="chat"></div>

<div id="inputArea">
    <input type="text" id="messageInput" placeholder="Écris..." />
    <button onclick="sendMessage()">Envoyer</button>
    <button onclick="captureWebcam()">📷 Webcam</button>
    <button onclick="getLocalisation()">📍 Localisation</button>
</div>

<video id="video" autoplay></video>

<script>

const GROQ_API_KEY = "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";
const MODEL = "groq/compound";
const VISION_MODEL = "meta-llama/llama-4-scout-17b-16e-instruct";

let conversation = [];

const chatDiv = document.getElementById("chat");

// =======================
// LOAD CONVERSATION
// =======================
async function loadConversation() {
    const res = await fetch("https://vinada9952rika.pythonanywhere.com/getConversation");
    conversation = await res.json();
    conversation.forEach(msg => {
        addMessage(msg.content, msg.role === "user" ? "user" : "bot");
    });
}

// =======================
// SAVE CONVERSATION
// =======================
async function saveConversation() {
    await fetch("https://vinada9952rika.pythonanywhere.com/setConversation", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ conversation })
    });
}

// =======================
// ADD MESSAGE UI
// =======================
function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;
    chatDiv.appendChild(div);
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

// =======================
// SEND MESSAGE
// =======================
async function sendMessage() {

    const input = document.getElementById("messageInput");
    const message = input.value;
    if (!message) return;

    addMessage(message, "user");

    conversation.push({ role: "user", content: message });
    input.value = "";

    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + GROQ_API_KEY
        },
        body: JSON.stringify({
            model: MODEL,
            messages: conversation
        })
    });

    const data = await response.json();
    const botMessage = data.choices[0].message.content;

    conversation.push({ role: "assistant", content: botMessage });
    addMessage(botMessage, "bot");

    speak(botMessage);
    saveConversation();
}

// =======================
// WEBCAM CAPTURE AUTO
// =======================
async function captureWebcam() {

    const video = document.getElementById("video");
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;

    await new Promise(r => setTimeout(r, 1000));

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    const imageBase64 = canvas.toDataURL("image/jpeg");

    stream.getTracks().forEach(track => track.stop());

    addMessage("📷 Analyse webcam...", "user");

    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + GROQ_API_KEY
        },
        body: JSON.stringify({
            model: VISION_MODEL,
            messages: [
                {
                    role: "user",
                    content: [
                        { type: "text", text: "Analyse cette image webcam" },
                        {
                            type: "image_url",
                            image_url: { url: imageBase64 }
                        }
                    ]
                }
            ]
        })
    });

    const data = await response.json();
    const botMessage = data.choices[0].message.content;

    addMessage(botMessage, "bot");
    speak(botMessage);
}

// =======================
// TOOL getLocalisation
// =======================
async function getLocalisation() {

    navigator.geolocation.getCurrentPosition(async (position) => {

        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        const localisationText = `Ma position actuelle est : Latitude ${lat}, Longitude ${lon}`;

        addMessage(localisationText, "user");

        conversation.push({ role: "user", content: localisationText });

        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + GROQ_API_KEY
            },
            body: JSON.stringify({
                model: MODEL,
                messages: conversation
            })
        });

        const data = await response.json();
        const botMessage = data.choices[0].message.content;

        conversation.push({ role: "assistant", content: botMessage });
        addMessage(botMessage, "bot");
        speak(botMessage);
        saveConversation();

    });
}

// =======================
// TTS
// =======================
function speak(text) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "fr-FR";
    speechSynthesis.speak(utterance);
}

// =======================
loadConversation();
</script>

</body>
</html>
